%YAML 1.1
---
release_platforms:
  ubuntu:
    - Resolutes
extends:
  - distro_name: lyrical
    extension_method: binary_import
repositories:
  gazebo_ros_pkgs:
    release:
      packages:
        - gazebo_ros_pkgs
      tags:
        release: release/rolling/{package}/{version}
      url: https://github.com/ros2-gbp/gazebo_ros_pkgs-release.git
      version: 3.7.0-2
    status: maintained
type: distribution
version: 3
