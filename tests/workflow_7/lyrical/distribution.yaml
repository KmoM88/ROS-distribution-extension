%YAML 1.1
---
release_platforms:
  ubuntu:
    - Resolutes
repositories:
  common_interfaces:
    release:
      packages:
        - std_msgs
      tags:
        release: release/rolling/{package}/{version}
      url: https://github.com/ros2-gbp/common_interfaces-release.git
      version: 5.9.2-2
    status: maintained
  ros_tutorials:
    release:
      packages:
        - turtlesim
      tags:
        release: release/rolling/{package}/{version}
      url: https://github.com/ros2-gbp/ros_tutorials-release.git
      version: 1.9.2-1
    status: maintained
type: distribution
version: 3
