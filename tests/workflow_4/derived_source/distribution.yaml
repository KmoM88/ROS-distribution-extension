%YAML 1.1
---
release_platforms:
  ubuntu: [noble]
extends:
  - distro_name: base
    extension_method: source_rebuild
repositories:
  ros_tutorials:
    doc:
      type: git
      url: https://github.com/ros/ros_tutorials.git
      version: custom-branch
    release:
      packages:
        - turtlesim
      tags:
        release: release/{package}/{version}
      url: https://github.com/ros-gbp/ros_tutorials-release.git
      version: 0.3.10
    status: maintained
tags:
  - derived_source
type: distribution
version: 3
