%YAML 1.1
---
extends:
  - distro_name: parent_a
    extension_method: binary_import
  - distro_name: parent_b
    extension_method: source_rebuild
release_platforms:
  ubuntu: [noble]
repositories:
  child_repo:
    release:
      packages:
        - child_pkg
      tags:
        release: release/{package}/{version}
      url: https://github.com/ros-gbp/child-release.git
      version: 0.1.0
type: distribution
version: 3
